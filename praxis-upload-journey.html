<title>Praxis Upload Modul - geschützter Pitch</title>
<style>
:root {
  --bg: #faf7f0;
  --paper: #fffdf8;
  --ink: #211c17;
  --muted: #686057;
  --line: #c7332b;
  --border: rgba(33, 28, 23, 0.14);
  --shadow: 0 22px 70px rgba(56, 42, 24, 0.14);
  --serif: Georgia, "Times New Roman", serif;
}
* { box-sizing: border-box; }
html, body { min-height: 100%; }
body {
  margin: 0;
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: clamp(1.25rem, 5vw, 4rem);
  background:
    radial-gradient(circle at 16% 8%, rgba(199, 51, 43, 0.13), transparent 28rem),
    linear-gradient(180deg, #fbf4e9 0%, var(--bg) 56%, #f3eadf 100%);
  color: var(--ink);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
.lock-shell {
  width: min(100%, 34rem);
  position: relative;
  padding: clamp(1.4rem, 5vw, 2.4rem);
  border: 1px solid var(--border);
  border-radius: 1.35rem;
  background: rgba(255, 253, 248, 0.88);
  box-shadow: var(--shadow);
  overflow: hidden;
}
.lock-thread {
  position: absolute;
  top: -1.5rem;
  left: 0;
  width: 8rem;
  height: calc(100% + 3rem);
  pointer-events: none;
  z-index: 0;
}
.lock-thread path {
  fill: none;
  stroke: var(--line);
  stroke-width: 2;
  stroke-linecap: round;
  filter: drop-shadow(0 12px 22px rgba(199, 51, 43, 0.2));
}
.lock-content { position: relative; z-index: 1; }
.kicker {
  margin: 0 0 0.85rem;
  color: var(--line);
  font-size: 0.78rem;
  font-weight: 800;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
h1 {
  margin: 0 0 0.85rem;
  font-family: var(--serif);
  font-weight: 400;
  font-size: clamp(2.1rem, 9vw, 4.2rem);
  line-height: 0.98;
  letter-spacing: -0.04em;
}
p {
  margin: 0;
  color: var(--muted);
  font-size: 1rem;
  line-height: 1.55;
}
form {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 0.7rem;
  margin-top: 1.6rem;
}
label { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0 0 0 0); }
input, button {
  min-height: 3rem;
  border-radius: 999px;
  font: inherit;
}
input {
  width: 100%;
  border: 1px solid var(--border);
  padding: 0 1rem;
  background: #fffdf8;
  color: var(--ink);
}
button {
  border: 0;
  padding: 0 1.15rem;
  background: var(--line);
  color: white;
  font-weight: 800;
  cursor: pointer;
}
button:disabled { cursor: wait; opacity: 0.72; }
.status {
  min-height: 1.4rem;
  margin-top: 0.9rem;
  color: #8f211b;
  font-size: 0.9rem;
  font-weight: 700;
}
.hint {
  margin-top: 1rem;
  font-size: 0.86rem;
}
@media (max-width: 520px) {
  form { grid-template-columns: 1fr; }
  button { width: 100%; }
}
</style>
</head>

<script>
(() => {
  const form = document.getElementById('unlock-form');
  const input = document.getElementById('password');
  const button = document.getElementById('unlock-button');
  const status = document.getElementById('status');
  const payload = JSON.parse(document.getElementById('encrypted-payload').textContent);

  const fromBase64 = (value) => Uint8Array.from(atob(value), (char) => char.charCodeAt(0));
  const joinBytes = (...parts) => {
    const total = parts.reduce((sum, part) => sum + part.byteLength, 0);
    const out = new Uint8Array(total);
    let offset = 0;
    for (const part of parts) {
      out.set(part, offset);
      offset += part.byteLength;
    }
    return out;
  };

  async function deriveKey(password) {
    const baseKey = await crypto.subtle.importKey(
      'raw',
      new TextEncoder().encode(password),
      'PBKDF2',
      false,
      ['deriveKey']
    );
    return crypto.subtle.deriveKey(
      {
        name: 'PBKDF2',
        salt: fromBase64(payload.salt),
        iterations: payload.iterations,
        hash: 'SHA-256'
      },
      baseKey,
      { name: 'AES-GCM', length: 256 },
      false,
      ['decrypt']
    );
  }

  async function unlock(password) {
    const key = await deriveKey(password);
    const plaintext = await crypto.subtle.decrypt(
      { name: 'AES-GCM', iv: fromBase64(payload.iv) },
      key,
      joinBytes(fromBase64(payload.ciphertext), fromBase64(payload.tag))
    );
    return new TextDecoder().decode(plaintext);
  }

  form.addEventListener('submit', async (event) => {
    event.preventDefault();
    const password = input.value.trim();
    if (!password) {
      status.textContent = 'Bitte Passwort eingeben.';
      input.focus();
      return;
    }

    button.disabled = true;
    status.textContent = 'Entschlüssle lokal im Browser ...';
    try {
      const decryptedHtml = await unlock(password);
      document.open();
      document.write(decryptedHtml);
      document.close();
    } catch (error) {
      console.warn('Pitch unlock failed', error);
      status.textContent = 'Passwort passt nicht oder Datei ist beschädigt.';
      button.disabled = false;
      input.select();
      input.focus();
    }
  });
})();
</script>
